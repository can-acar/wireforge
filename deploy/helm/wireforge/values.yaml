image:
  repository: ghcr.io/can-acar/wireforge
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1   # SQLite — single writer

service:
  type: LoadBalancer
  httpPort: 8080
  # WireGuard listen port range exposed to the world.
  wgPort: 51820

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi

security:
  master_key: ""   # required; pass via --set or sealed-secret
  login_max_attempts: 5
  login_lockout_secs: 300
  totp_issuer: "Wireforge"

wireguard:
  endpoint: ""

web:
  locale_default: "en"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
