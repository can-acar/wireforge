{% extends "layouts/base.html" %}
{% block title %}Verify · Wireforge{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white dark:bg-slate-800 rounded-lg shadow p-6">
        <h1 class="text-xl font-semibold mb-2">Two-factor verification</h1>
        <p class="text-sm text-slate-500 mb-4">Enter the 6-digit code from your authenticator app.</p>
        {% if let Some(err) = error %}
            <div class="mb-3 rounded bg-red-50 dark:bg-red-900/30 px-3 py-2 text-sm text-red-700 dark:text-red-300">
                {{ err }}
            </div>
        {% endif %}
        <form method="post" action="/login/totp" class="space-y-3">
            <input class="mt-1 w-full rounded border-slate-300 dark:bg-slate-700 dark:border-slate-600 px-3 py-2 font-mono text-center text-lg tracking-widest"
                   name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code"
                   autofocus required>
            <button type="submit"
                    class="w-full rounded bg-slate-900 dark:bg-slate-100 dark:text-slate-900 text-white py-2">
                Verify
            </button>
        </form>
    </div>
</div>
{% endblock %}
