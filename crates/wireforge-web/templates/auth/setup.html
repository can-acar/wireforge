{% extends "layouts/base.html" %}
{% block title %}Initial setup · Wireforge{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-lg shadow p-6">
        <h1 class="text-xl font-semibold mb-2">⚒️ Welcome to Wireforge</h1>
        <p class="text-sm text-slate-500 mb-4">Create the first administrator account.</p>
        {% if let Some(err) = error %}
            <div class="mb-3 rounded bg-red-50 dark:bg-red-900/30 px-3 py-2 text-sm text-red-700 dark:text-red-300">
                {{ err }}
            </div>
        {% endif %}
        <form method="post" action="/setup" class="space-y-3">
            <label class="block text-sm">
                <span>Username</span>
                <input class="mt-1 w-full rounded border-slate-300 dark:bg-slate-700 dark:border-slate-600 px-3 py-2"
                       name="username" required minlength="3" maxlength="64">
            </label>
            <label class="block text-sm">
                <span>Email (optional)</span>
                <input class="mt-1 w-full rounded border-slate-300 dark:bg-slate-700 dark:border-slate-600 px-3 py-2"
                       name="email" type="email">
            </label>
            <label class="block text-sm">
                <span>Password</span>
                <input class="mt-1 w-full rounded border-slate-300 dark:bg-slate-700 dark:border-slate-600 px-3 py-2"
                       name="password" type="password" required minlength="12"
                       autocomplete="new-password">
            </label>
            <label class="block text-sm">
                <span>Confirm password</span>
                <input class="mt-1 w-full rounded border-slate-300 dark:bg-slate-700 dark:border-slate-600 px-3 py-2"
                       name="password_confirm" type="password" required minlength="12"
                       autocomplete="new-password">
            </label>
            <button type="submit"
                    class="w-full rounded bg-slate-900 dark:bg-slate-100 dark:text-slate-900 text-white py-2">
                Create account
            </button>
        </form>
    </div>
</div>
{% endblock %}
